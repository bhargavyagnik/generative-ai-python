name: Generate and Deploy Documentation

on:
  push:
    branches: [ main ]  # Trigger on push to main branches
  pull_request:
    branches: [ main ]  # Also trigger on PRs to main branches
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for proper versioning

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install git+https://github.com/tensorflow/docs
        pip install absl-py google-generativeai grpcio jinja2 pydantic ipython pillow pyyaml

    - name: Generate documentation
      run: |
        python docs/build_docs.py --output_dir=_site

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      id: deployment
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: actions/deploy-pages@v3
