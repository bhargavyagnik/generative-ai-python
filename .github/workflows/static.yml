name: Generate and Deploy Documentation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install git+https://github.com/tensorflow/docs
        pip install absl-py google-generativeai grpcio jinja2 pydantic ipython pillow pyyaml

    - name: Generate documentation
      run: |
        python docs/build_docs.py --output_dir=_site

    - name: Setup documentation structure
      run: |
        # Create _site directory if it doesn't exist
        mkdir -p _site
        
        # Copy the generativeai.md as index.md
        cp docs/api/google/generativeai.md _site/index.md
        
        # Create jekyll config file
        echo "title: Generative AI Python
        description: Documentation for Generative AI Python
        baseurl: '/generative-ai-python'
        url: 'https://www.bhargavyagnik.com'
        remote_theme: just-the-docs/just-the-docs
        
        # Enable or disable the site search
        search_enabled: true
        
        # Aux links for the upper right navigation
        aux_links:
          'View on GitHub':
            - 'https://github.com/bhargavyagnik/generative-ai-python'
        " > _site/_config.yml

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      id: deployment
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: actions/deploy-pages@v3
