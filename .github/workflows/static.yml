name: Build Docs

on:
  push:
    branches: [ main ]  # Update this branch name if needed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate API docs
        run: |
          python build_docs.py  # Assuming build_docs.py is in the root of your repo

      - name: Deploy to GitHub Pages
        uses: actions/deploy-github-pages@v4
        with:
          branch: gh-pages  # Update this branch name if needed
          folder: docs
